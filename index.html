<!DOCTYPE html>
<html>

<head>

  <title>Healthcare Management System</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fc;
      padding: 40px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      text-align: center;
      color: #0b3d91;
      margin-bottom: 30px;
      font-size: 42px;
    }

    .form-container {

      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
      margin-bottom: 40px;

    }

    .form-grid {

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;

    }

    input, select {

      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;

    }

    button {

      margin-top: 20px;
      padding: 14px 25px;
      background: #0b3d91;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;

    }

    button:hover {
      background: #072c66;
    }

    h2 {
      margin-bottom: 20px;
      color: #222;
    }

    .patients-grid {

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;

    }

    .patient-card {

      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;

    }

    .patient-card:hover {
      transform: translateY(-5px);
    }

    .patient-card h3 {
      color: #0b3d91;
      margin-bottom: 10px;
    }

    .patient-card p {
      margin: 8px 0;
      color: #333;
    }

  </style>

</head>

<body>

<div class="container">

  <h1>Healthcare Management System</h1>

  <div class="form-container">

    <div class="form-grid">

      <input type="text" id="name" placeholder="Patient Name">

      <input type="number" id="age" placeholder="Age">

      <select id="gender">

        <option value="">Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>

      </select>

      <input type="text" id="disease" placeholder="Disease">

      <input type="text" id="doctor" placeholder="Doctor Name">

    </div>

    <button onclick="addPatient()">Add Patient</button>

  </div>

  <h2>Patients List</h2>

  <div id="patients" class="patients-grid"></div>

</div>

<script>

async function addPatient() {

  const patient = {

    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    gender: document.getElementById("gender").value,
    disease: document.getElementById("disease").value,
    doctor: document.getElementById("doctor").value,
    admissionDate: new Date()

  };

  await fetch("/add-patient", {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify(patient)

  });

  loadPatients();

}

async function loadPatients() {

  const response = await fetch("/patients");

  const patients = await response.json();

  let output = "";

  patients.forEach(patient => {

    output += `

      <div class="patient-card">

        <h3>${patient.name}</h3>

        <p><strong>Age:</strong> ${patient.age}</p>

        <p><strong>Gender:</strong> ${patient.gender}</p>

        <p><strong>Disease:</strong> ${patient.disease}</p>

        <p><strong>Doctor:</strong> ${patient.doctor}</p>

      </div>

    `;
  });

  document.getElementById("patients").innerHTML = output;

}

loadPatients();

</script>

</body>
</html>
